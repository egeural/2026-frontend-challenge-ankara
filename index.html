<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Intelligence — Ankara 2026</title>
  <link rel="stylesheet" href="/node_modules/leaflet/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --text: #e2e8f0;
      --muted: #8892a4;
      --low: #38a169;
      --medium: #d69e2e;
      --high: #e53e3e;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    header .logo span { color: var(--accent); }
    header .subtitle { color: var(--muted); font-size: 13px; }
    header .refresh-btn {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    header .refresh-btn:hover { opacity: 0.85; }
    header .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Stats bar ── */
    #stats-bar {
      display: flex;
      gap: 12px;
      padding: 14px 24px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      min-width: 130px;
      flex: 1;
    }
    .stat-card .count { font-size: 26px; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ── Main layout ── */
    .layout {
      display: flex;
      height: calc(100vh - 115px);
    }

    /* ── Sidebar tabs ── */
    aside {
      width: 200px;
      min-width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 12px 8px;
      overflow-y: auto;
    }
    aside h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 4px 10px 10px; }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active { background: var(--surface2); color: var(--accent); font-weight: 600; }
    .tab-btn .icon { font-size: 16px; }
    .tab-btn .badge {
      margin-left: auto;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }
    .tab-btn.active .badge { background: var(--accent); color: #fff; }

    /* ── Content pane ── */
    main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pane { display: none; flex: 1; min-height: 0; }
    .pane.active { display: flex; flex-direction: column; }

    /* non-map panes scroll their own content */
    .pane:not(#pane-map).active {
      overflow-y: auto;
      padding: 20px 24px;
    }

    /* ── Search / filter bar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
      color: #fff;
    }
    .card-meta { flex: 1; }
    .card-title { font-weight: 600; font-size: 15px; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .badge-urg {
      padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .badge-low  { background: rgba(56,161,105,.2); color: #68d391; }
    .badge-medium { background: rgba(214,158,46,.2); color: #f6c90e; }
    .badge-high { background: rgba(229,62,62,.2); color: #fc8181; }

    .card-body { font-size: 14px; line-height: 1.6; color: var(--text); }
    .card-body .message-text {
      background: var(--surface2);
      border-left: 3px solid var(--accent2);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin: 8px 0;
      font-style: italic;
    }

    .card-footer {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    .meta-item .ico { font-size: 13px; }

    /* ── Empty / loading ── */
    .loading, .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Map pane ── */
    #pane-map {
      height: 100%;
      padding: 0;
      display: none;
      flex-direction: column;
    }
    #pane-map.active { display: flex; }

    #map-container {
      flex: 1;
      min-height: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
    }

    /* ── Timeline strip ── */
    #timeline-wrap {
      height: 190px;
      min-height: 190px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    #timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px 5px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #timeline-header .tl-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
    }
    #timeline-header .tl-legend {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .tl-leg-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--muted);
    }
    .tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    #timeline-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      align-items: stretch;
      padding: 10px 14px;
      gap: 8px;
    }
    #timeline-scroll::-webkit-scrollbar { height: 4px; }
    #timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tl-card {
      flex-shrink: 0;
      width: 170px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-left: 3px solid var(--accent);
    }
    .tl-card:hover { border-color: #fff; transform: translateY(-1px); }
    .tl-card.tl-active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,.15); }

    .tl-time {
      font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
      line-height: 1;
    }
    .tl-type {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted); font-weight: 600;
    }
    .tl-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-desc {
      font-size: 11px; color: var(--muted);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.4;
    }
    .tl-loc { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: auto; }

    /* override leaflet popup for dark theme */
    .leaflet-popup-content-wrapper {
      background: #1e2235;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      min-width: 260px;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-content { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    .popup-inner { padding: 14px 16px; }
    .popup-type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      padding: 3px 8px; border-radius: 99px; margin-bottom: 8px;
    }
    .popup-title { font-weight: 700; font-size: 16px; margin-bottom: 2px; line-height: 1.2; }
    .popup-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .popup-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .popup-body { font-size: 13px; line-height: 1.55; color: #cbd5e0; margin-bottom: 8px; }
    .popup-meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 8px; font-size: 11px; }
    .popup-meta-label { color: var(--muted); white-space: nowrap; }
    .popup-meta-val { color: var(--text); font-weight: 500; }
    .popup-level {
      display: inline-block; margin-top: 8px;
      padding: 2px 9px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Event<span>Intel</span></div>
    <div class="subtitle">Ankara 2026 — Field Data Dashboard</div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</header>

<div id="stats-bar">
  <div class="stat-card"><div class="count" id="s-checkins">—</div><div class="label">Check-ins</div></div>
  <div class="stat-card"><div class="count" id="s-messages">—</div><div class="label">Messages</div></div>
  <div class="stat-card"><div class="count" id="s-sightings">—</div><div class="label">Sightings</div></div>
  <div class="stat-card"><div class="count" id="s-notes">—</div><div class="label">Personal Notes</div></div>
  <div class="stat-card"><div class="count" id="s-tips">—</div><div class="label">Anonymous Tips</div></div>
</div>

<div class="layout">
  <aside>
    <h3>Forms</h3>
    <button class="tab-btn active" onclick="switchTab('checkins', this)">
      <span class="icon">📍</span> Check-ins <span class="badge" id="b-checkins">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('messages', this)">
      <span class="icon">💬</span> Messages <span class="badge" id="b-messages">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('sightings', this)">
      <span class="icon">👁</span> Sightings <span class="badge" id="b-sightings">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('notes', this)">
      <span class="icon">📝</span> Notes <span class="badge" id="b-notes">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('tips', this)">
      <span class="icon">🔎</span> Anon Tips <span class="badge" id="b-tips">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('map', this)">
      <span class="icon">🗺</span> Map View
    </button>
  </aside>

  <main>
    <div id="pane-checkins" class="pane active">
      <div class="toolbar">
        <input class="search-input" placeholder="Search check-ins…" oninput="filterCards('checkins', this.value)" />
      </div>
      <div class="cards" id="cards-checkins"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-messages" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search messages…" oninput="filterCards('messages', this.value)" />
      </div>
      <div class="cards" id="cards-messages"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-sightings" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search sightings…" oninput="filterCards('sightings', this.value)" />
      </div>
      <div class="cards" id="cards-sightings"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-notes" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search notes…" oninput="filterCards('notes', this.value)" />
      </div>
      <div class="cards" id="cards-notes"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-tips" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search tips…" oninput="filterCards('tips', this.value)" />
      </div>
      <div class="cards" id="cards-tips"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-map" class="pane">
      <div id="map-container"></div>
      <div id="timeline-wrap">
        <div id="timeline-header">
          <span class="tl-title">⏱ Event Timeline — click to locate on map</span>
          <div class="tl-legend">
            <span class="tl-leg-item"><span class="tl-dot" style="background:#4f8ef7"></span>Check-in</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#a78bfa"></span>Message</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#34d399"></span>Sighting</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#6ee7b7"></span>Note</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#f87171"></span>Anon Tip</span>
          </div>
        </div>
        <div id="timeline-scroll"></div>
      </div>
    </div>
  </main>
</div>

<script>
  const BASE = 'https://api.jotform.com';

  // Each form uses a separate key to avoid hitting per-key rate limits
  const FORMS = {
    checkins:  { id: '261065067494966',  label: 'Checkins',       key: '54a934fa20b1ccc3a5bd1d2076f90556' },
    messages:  { id: '261065765723966',  label: 'Messages',       key: '54a934fa20b1ccc3a5bd1d2076f90556' },
    sightings: { id: '261065244786967',  label: 'Sightings',      key: '5593acd695caab1a3805c3af8532df09' },
    notes:     { id: '261065509008958',  label: 'Personal Notes', key: '5593acd695caab1a3805c3af8532df09' },
    tips:      { id: '261065875889981',  label: 'Anonymous Tips', key: '5593acd695caab1a3805c3af8532df09' },
  };

  // keyed by form slug → array of raw cards (rendered HTML strings)
  const cache = {};

  function initials(name) {
    if (!name) return '?';
    return name.trim().split(/\s+/).map(p => p[0]).join('').toUpperCase().slice(0, 2);
  }

  function badgeHtml(level) {
    if (!level) return '';
    const cls = level.toLowerCase();
    return `<span class="badge-urg badge-${cls}">${level}</span>`;
  }

  function metaHtml(icon, text) {
    if (!text) return '';
    return `<span class="meta-item"><span class="ico">${icon}</span>${text}</span>`;
  }

  function mapAnswers(answers, questions) {
    const out = {};
    for (const qid in answers) {
      const qName = questions[qid]?.name || qid;
      const val = answers[qid]?.answer ?? answers[qid];
      if (val !== undefined && val !== null && val !== '') out[qName] = val;
    }
    return out;
  }

  function buildCheckinCard(data) {
    const name = data.personName || data.name || '—';
    return `
      <div class="card" data-search="${(name + data.location + data.note).toLowerCase()}">
        <div class="card-header">
          <div class="avatar">${initials(name)}</div>
          <div class="card-meta">
            <div class="card-title">${name}</div>
            <div class="card-sub">Check-in</div>
          </div>
        </div>
        <div class="card-body">${data.note || ''}</div>
        <div class="card-footer">
          ${metaHtml('🕐', data.timestamp)}
          ${metaHtml('📍', data.location)}
          ${data.coordinates ? metaHtml('🗺', `<a href="https://maps.google.com/?q=${encodeURIComponent(data.coordinates)}" target="_blank" style="color:var(--accent);text-decoration:none">${data.coordinates}</a>`) : ''}
        </div>
      </div>`;
  }

  function buildMessageCard(data) {
    const sender = data.senderName || data.sender || '—';
    const recipient = data.recipientName || data.recipient || '—';
    const urgency = (data.urgency || '').toLowerCase();
    const text = data.text || data.message || '';
    return `
      <div class="card" data-search="${(sender + recipient + text + data.location).toLowerCase()}">
        <div class="card-header">
          <div class="avatar" style="background:var(--accent)">${initials(sender)}</div>
          <div class="card-meta">
            <div class="card-title">${sender} → ${recipient}</div>
            <div class="card-sub">Message</div>
          </div>
          ${badgeHtml(urgency)}
        </div>
        <div class="card-body">
          <div class="message-text">${text}</div>
        </div>
        <div class="card-footer">
          ${metaHtml('🕐', data.timestamp)}
          ${metaHtml('📍', data.location)}
          ${data.coordinates ? metaHtml('🗺', `<a href="https://maps.google.com/?q=${encodeURIComponent(data.coordinates)}" target="_blank" style="color:var(--accent);text-decoration:none">${data.coordinates}</a>`) : ''}
        </div>
      </div>`;
  }

  function buildSightingCard(data) {
    const person = data.personName || data.person || '—';
    const seenWith = data.seenWith || '—';
    return `
      <div class="card" data-search="${(person + seenWith + data.location + (data.note||'')).toLowerCase()}">
        <div class="card-header">
          <div class="avatar" style="background:#2b6cb0">${initials(person)}</div>
          <div class="card-meta">
            <div class="card-title">${person}</div>
            <div class="card-sub">Seen with: <strong>${seenWith}</strong></div>
          </div>
        </div>
        <div class="card-body">${data.note || ''}</div>
        <div class="card-footer">
          ${metaHtml('🕐', data.timestamp)}
          ${metaHtml('📍', data.location)}
          ${data.coordinates ? metaHtml('🗺', `<a href="https://maps.google.com/?q=${encodeURIComponent(data.coordinates)}" target="_blank" style="color:var(--accent);text-decoration:none">${data.coordinates}</a>`) : ''}
        </div>
      </div>`;
  }

  function buildNoteCard(data) {
    const author = data.authorName || data.author || '—';
    const mentioned = Array.isArray(data.mentionedPeople)
      ? data.mentionedPeople.join(', ')
      : (data.mentionedPeople || '');
    return `
      <div class="card" data-search="${(author + (data.note||'') + data.location).toLowerCase()}">
        <div class="card-header">
          <div class="avatar" style="background:#2d6a4f">${initials(author)}</div>
          <div class="card-meta">
            <div class="card-title">${author}</div>
            <div class="card-sub">Personal Note</div>
          </div>
        </div>
        <div class="card-body">${data.note || ''}</div>
        <div class="card-footer">
          ${metaHtml('🕐', data.timestamp)}
          ${metaHtml('📍', data.location)}
          ${mentioned ? metaHtml('👤', mentioned) : ''}
          ${data.coordinates ? metaHtml('🗺', `<a href="https://maps.google.com/?q=${encodeURIComponent(data.coordinates)}" target="_blank" style="color:var(--accent);text-decoration:none">${data.coordinates}</a>`) : ''}
        </div>
      </div>`;
  }

  function buildTipCard(data) {
    const answers = data.answers || data;
    const suspect = answers.suspectName || answers['suspectName'] || '—';
    const tip = answers.tip || answers['tip'] || '';
    const confidence = (answers.confidence || '').toLowerCase();
    const location = answers.location || '';
    const timestamp = answers.timestamp || '';
    const coords = answers.coordinates || '';
    return `
      <div class="card" data-search="${(suspect + tip + location).toLowerCase()}">
        <div class="card-header">
          <div class="avatar" style="background:#742a2a">${initials(suspect)}</div>
          <div class="card-meta">
            <div class="card-title">Suspect: ${suspect}</div>
            <div class="card-sub">Anonymous Tip</div>
          </div>
          ${badgeHtml(confidence)}
        </div>
        <div class="card-body">${tip}</div>
        <div class="card-footer">
          ${metaHtml('🕐', timestamp)}
          ${metaHtml('📍', location)}
          ${coords ? metaHtml('🗺', `<a href="https://maps.google.com/?q=${encodeURIComponent(coords)}" target="_blank" style="color:var(--accent);text-decoration:none">${coords}</a>`) : ''}
        </div>
      </div>`;
  }

  const BUILDERS = {
    checkins:  buildCheckinCard,
    messages:  buildMessageCard,
    sightings: buildSightingCard,
    notes:     buildNoteCard,
    tips:      buildTipCard,
  };

  const STAT_IDS = {
    checkins: 's-checkins',
    messages: 's-messages',
    sightings: 's-sightings',
    notes: 's-notes',
    tips: 's-tips',
  };
  const BADGE_IDS = {
    checkins: 'b-checkins',
    messages: 'b-messages',
    sightings: 'b-sightings',
    notes: 'b-notes',
    tips: 'b-tips',
  };

  async function fetchForm(slug) {
    const { id, key } = FORMS[slug];
    const [qRes, sRes] = await Promise.all([
      fetch(`${BASE}/form/${id}/questions?apiKey=${key}`).then(r => r.json()),
      fetch(`${BASE}/form/${id}/submissions?apiKey=${key}&limit=100&orderby=created_at,DESC`).then(r => r.json()),
    ]);

    const questions = qRes.content || {};
    const submissions = sRes.content || [];

    return submissions.map(sub => {
      const mapped = mapAnswers(sub.answers || {}, questions);
      return { ...mapped, _id: sub.id, _created: sub.created_at };
    });
  }

  async function loadForm(slug) {
    const container = document.getElementById(`cards-${slug}`);
    container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading…</div>';
    try {
      const rows = await fetchForm(slug);
      cache[slug] = rows;
      const count = rows.length;
      document.getElementById(STAT_IDS[slug]).textContent = count;
      document.getElementById(BADGE_IDS[slug]).textContent = count;
      renderCards(slug, rows);
    } catch (e) {
      container.innerHTML = `<div class="empty">⚠️ Failed to load: ${e.message}</div>`;
    }
  }

  function renderCards(slug, rows) {
    const container = document.getElementById(`cards-${slug}`);
    if (!rows.length) {
      container.innerHTML = '<div class="empty">No submissions found.</div>';
      return;
    }
    container.innerHTML = rows.map(BUILDERS[slug]).join('');
  }

  function filterCards(slug, query) {
    const rows = cache[slug] || [];
    const q = query.toLowerCase().trim();
    if (!q) { renderCards(slug, rows); return; }
    const filtered = rows.filter(r => {
      const text = Object.values(r).join(' ').toLowerCase();
      return text.includes(q);
    });
    renderCards(slug, filtered);
    if (filtered.length === 0) {
      document.getElementById(`cards-${slug}`).innerHTML = '<div class="empty">No results for that search.</div>';
    }
  }

  // ── Leaflet map ──────────────────────────────────────────────
  let leafletMap = null;
  let mapInitialized = false;
  const markerRefs = {};   // key → { marker, coords, slug, data }

  const FORM_COLORS = {
    checkins:  '#4f8ef7',
    messages:  '#a78bfa',
    sightings: '#34d399',
    notes:     '#6ee7b7',
    tips:      '#f87171',
  };
  const FORM_LABELS = {
    checkins: 'Check-in', messages: 'Message', sightings: 'Sighting',
    notes: 'Personal Note', tips: 'Anon Tip',
  };
  const LEVEL_COLORS = { low:'#68d391', medium:'#f6c90e', high:'#fc8181' };

  function parseCoords(str) {
    if (!str) return null;
    const parts = str.split(',').map(s => parseFloat(s.trim()));
    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return parts;
    return null;
  }

  function parseTimestamp(ts) {
    if (!ts) return 0;
    // "DD-MM-YYYY HH:MM"
    const m = ts.match(/(\d+)-(\d+)-(\d+)\s+(\d+):(\d+)/);
    if (!m) return 0;
    return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]).getTime();
  }

  function timeHHMM(ts) {
    if (!ts) return '??:??';
    const m = ts.match(/(\d+):(\d+)$/);
    return m ? `${m[1]}:${m[2]}` : ts;
  }

  // Returns { title, subtitle, body, location, timestamp, coords, level }
  function extractEvent(slug, data) {
    if (slug === 'checkins') return {
      title: data.personName || '—',
      subtitle: 'Checked in',
      body: data.note || '',
      location: data.location || '',
      timestamp: data.timestamp || '',
      coords: data.coordinates || '',
      level: null,
    };
    if (slug === 'messages') return {
      title: `${data.senderName || '—'} → ${data.recipientName || '—'}`,
      subtitle: 'Message',
      body: data.text || data.message || '',
      location: data.location || '',
      timestamp: data.timestamp || '',
      coords: data.coordinates || '',
      level: (data.urgency || '').toLowerCase(),
      extra: null,
    };
    if (slug === 'sightings') return {
      title: data.personName || '—',
      subtitle: `Seen with ${data.seenWith || '—'}`,
      body: data.note || '',
      location: data.location || '',
      timestamp: data.timestamp || '',
      coords: data.coordinates || '',
      level: null,
    };
    if (slug === 'notes') {
      const m = Array.isArray(data.mentionedPeople) ? data.mentionedPeople.join(', ') : (data.mentionedPeople || '');
      return {
        title: data.authorName || '—',
        subtitle: m ? `Mentions: ${m}` : 'Personal note',
        body: data.note || '',
        location: data.location || '',
        timestamp: data.timestamp || '',
        coords: data.coordinates || '',
        level: null,
      };
    }
    if (slug === 'tips') return {
      title: `Suspect: ${data.suspectName || '—'}`,
      subtitle: 'Anonymous tip',
      body: data.tip || '',
      location: data.location || '',
      timestamp: data.timestamp || '',
      coords: data.coordinates || '',
      level: (data.confidence || '').toLowerCase(),
    };
    return {};
  }

  function buildPopupHtml(slug, ev) {
    const color = FORM_COLORS[slug];
    const label = FORM_LABELS[slug];
    const lc = ev.level ? LEVEL_COLORS[ev.level] || '#888' : null;

    const metaRows = [
      ev.timestamp ? `<div class="popup-meta-label">Time</div><div class="popup-meta-val">${ev.timestamp}</div>` : '',
      ev.location  ? `<div class="popup-meta-label">Location</div><div class="popup-meta-val">${ev.location}</div>` : '',
      ev.subtitle && !ev.subtitle.startsWith('Checked') && !ev.subtitle.startsWith('Message') && !ev.subtitle.startsWith('Personal')
        ? `<div class="popup-meta-label">Detail</div><div class="popup-meta-val">${ev.subtitle}</div>` : '',
    ].filter(Boolean).join('');

    return `<div class="popup-inner">
      <div class="popup-type-badge" style="background:${color}22;color:${color}">${label}</div>
      <div class="popup-title">${ev.title}</div>
      ${ev.subtitle ? `<div class="popup-subtitle">${ev.subtitle}</div>` : ''}
      ${ev.body ? `<div class="popup-divider"></div><div class="popup-body">${ev.body}</div>` : ''}
      ${metaRows ? `<div class="popup-divider"></div><div class="popup-meta-grid">${metaRows}</div>` : ''}
      ${lc ? `<div class="popup-level" style="background:${lc}22;color:${lc}">${ev.level}</div>` : ''}
    </div>`;
  }

  // ── Timeline ─────────────────────────────────────────────────
  function buildTimeline() {
    const scroll = document.getElementById('timeline-scroll');
    const allEvents = [];

    Object.keys(FORMS).forEach(slug => {
      (cache[slug] || []).forEach(data => {
        const ev = extractEvent(slug, data);
        if (!ev.coords) return;
        const key = `${slug}-${data._id}`;
        allEvents.push({ key, slug, data, ev, ts: parseTimestamp(ev.timestamp) });
      });
    });

    allEvents.sort((a, b) => a.ts - b.ts);

    scroll.innerHTML = allEvents.map(({ key, slug, ev }) => {
      const color = FORM_COLORS[slug];
      const label = FORM_LABELS[slug];
      const lc = ev.level ? LEVEL_COLORS[ev.level] || null : null;
      return `<div class="tl-card" id="tlc-${key}"
        style="border-left-color:${color}"
        onclick="focusEvent('${key}')">
        <div class="tl-time" style="color:${color}">${timeHHMM(ev.timestamp)}</div>
        <div class="tl-type">${label}</div>
        <div class="tl-name">${ev.title}</div>
        <div class="tl-desc">${ev.body || ev.subtitle || ''}</div>
        <div class="tl-loc">📍 ${ev.location}</div>
        ${lc ? `<div style="margin-top:4px;display:inline-block;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase;background:${lc}22;color:${lc}">${ev.level}</div>` : ''}
      </div>`;
    }).join('');
  }

  function focusEvent(key) {
    // Highlight timeline card
    document.querySelectorAll('.tl-card').forEach(c => c.classList.remove('tl-active'));
    const card = document.getElementById(`tlc-${key}`);
    if (card) { card.classList.add('tl-active'); card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }

    // Pan map and open popup
    const ref = markerRefs[key];
    if (ref && leafletMap) {
      leafletMap.setView(ref.coords, Math.max(leafletMap.getZoom(), 15), { animate: true });
      setTimeout(() => ref.marker.openPopup(), 300);
    }
  }

  function addMarkersToMap() {
    Object.keys(FORMS).forEach(slug => {
      (cache[slug] || []).forEach(data => {
        const ev = extractEvent(slug, data);
        const coords = parseCoords(ev.coords);
        if (!coords) return;

        const color = FORM_COLORS[slug];
        const key = `${slug}-${data._id}`;

        const marker = L.circleMarker(coords, {
          radius: 9,
          fillColor: color,
          color: '#fff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.9,
        }).addTo(leafletMap);

        marker.bindPopup(buildPopupHtml(slug, ev), { maxWidth: 300 });

        marker.on('click', () => {
          document.querySelectorAll('.tl-card').forEach(c => c.classList.remove('tl-active'));
          const card = document.getElementById(`tlc-${key}`);
          if (card) { card.classList.add('tl-active'); card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }
        });

        markerRefs[key] = { marker, coords, slug, data };
      });
    });
  }

  function initMap() {
    if (mapInitialized) return;
    mapInitialized = true;

    leafletMap = L.map('map-container', { zoomControl: true }).setView([39.915, 32.855], 14);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(leafletMap);

    addMarkersToMap();
    buildTimeline();
  }

  function switchTab(slug, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`pane-${slug}`).classList.add('active');
    if (slug === 'map') {
      if (!mapInitialized) initMap();
      else {
        setTimeout(() => leafletMap.invalidateSize(), 50);
        if (Object.keys(markerRefs).length === 0) { initMap(); }
      }
    }
  }

  async function loadAll() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Loading…';
    await Promise.all(Object.keys(FORMS).map(slug => loadForm(slug)));
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
    // rebuild markers + timeline if map is already open
    if (mapInitialized) {
      Object.values(markerRefs).forEach(r => r.marker.remove());
      Object.keys(markerRefs).forEach(k => delete markerRefs[k]);
      addMarkersToMap();
      buildTimeline();
    }
  }

  loadAll();
</script>
<script src="/node_modules/leaflet/dist/leaflet.js"></script>
</body>
</html>
