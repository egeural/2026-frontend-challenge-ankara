<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Intelligence — Ankara 2026</title>
</head>
<body>

<header>
  <div>
    <div class="logo">Event<span>Intel</span></div>
    <div class="subtitle">Ankara 2026 — Field Data Dashboard</div>
  </div>
  <div class="header-actions">
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">🌙</button>
  </div>
</header>

<div id="stats-bar">
  <div class="stat-card"><div class="count" id="s-checkins">—</div><div class="label">Check-ins</div></div>
  <div class="stat-card"><div class="count" id="s-messages">—</div><div class="label">Messages</div></div>
  <div class="stat-card"><div class="count" id="s-sightings">—</div><div class="label">Sightings</div></div>
  <div class="stat-card"><div class="count" id="s-notes">—</div><div class="label">Personal Notes</div></div>
  <div class="stat-card"><div class="count" id="s-tips">—</div><div class="label">Anonymous Tips</div></div>
</div>

<div class="layout">
  <aside>
    <h3>Forms</h3>
    <button class="tab-btn active" onclick="switchTab('checkins', this)">
      <span class="icon">📍</span> Check-ins <span class="badge" id="b-checkins">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('messages', this)">
      <span class="icon">💬</span> Messages <span class="badge" id="b-messages">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('sightings', this)">
      <span class="icon">👁</span> Sightings <span class="badge" id="b-sightings">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('notes', this)">
      <span class="icon">📝</span> Notes <span class="badge" id="b-notes">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('tips', this)">
      <span class="icon">🔎</span> Anon Tips <span class="badge" id="b-tips">…</span>
    </button>
    <button class="tab-btn" onclick="switchTab('map', this)">
      <span class="icon">🗺</span> Map View
    </button>
  </aside>

  <main>
    <div id="pane-checkins" class="pane active">
      <div class="toolbar">
        <input class="search-input" placeholder="Search check-ins…" oninput="filterCards('checkins', this.value)" />
      </div>
      <div class="cards" id="cards-checkins"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-messages" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search messages…" oninput="filterCards('messages', this.value)" />
      </div>
      <div class="cards" id="cards-messages"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-sightings" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search sightings…" oninput="filterCards('sightings', this.value)" />
      </div>
      <div class="cards" id="cards-sightings"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-notes" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search notes…" oninput="filterCards('notes', this.value)" />
      </div>
      <div class="cards" id="cards-notes"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-tips" class="pane">
      <div class="toolbar">
        <input class="search-input" placeholder="Search tips…" oninput="filterCards('tips', this.value)" />
      </div>
      <div class="cards" id="cards-tips"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <div id="pane-map" class="pane">
      <div id="map-container"></div>
      <div id="timeline-wrap">
        <div id="timeline-header">
          <span class="tl-title">⏱ Event Timeline — click to locate on map</span>
          <div class="tl-legend">
            <span class="tl-leg-item"><span class="tl-dot" style="background:#0099FF"></span>Check-in</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#FFB629"></span>Message</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#FF6100"></span>Sighting</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#00c8ff"></span>Note</span>
            <span class="tl-leg-item"><span class="tl-dot" style="background:#ff3300"></span>Anon Tip</span>
          </div>
        </div>
        <div id="timeline-scroll"></div>
      </div>
    </div>
  </main>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
